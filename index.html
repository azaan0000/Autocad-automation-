<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASASCO Professional CAD & Luxury Architectural Engine Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #090d16; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
    .tool-btn.active { background-color: #0284c7 !important; border-color: #38bdf8 !important; color: #fff !important; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans p-2 md:p-4 select-none">

  <!-- TOP HEADER NAVBAR -->
  <header class="max-w-[1800px] mx-auto bg-slate-900 border border-slate-800 rounded-2xl p-3 mb-4 flex flex-wrap justify-between items-center shadow-xl">
    <div class="flex items-center gap-3">
      <div class="bg-sky-600 p-2 rounded-xl text-lg shadow-lg shadow-sky-900/50">📐</div>
      <div>
        <h1 class="text-base font-extrabold text-sky-400 tracking-wide">ASASCO CAD STUDIO PRO <span class="text-[10px] bg-sky-950 border border-sky-800 text-sky-300 px-2 py-0.5 rounded-full ml-2">v8.5 Engine</span></h1>
        <p class="text-[11px] text-slate-400">Professional Luxury Doors, Windows & Hardware Auto-CAD Layout Designer</p>
      </div>
    </div>
    
    <!-- Quick Stats & Actions -->
    <div class="flex items-center gap-3 text-xs">
      <div class="bg-slate-950 px-3 py-1.5 rounded-xl border border-slate-800 flex items-center gap-2">
        <span class="text-slate-400">Project:</span>
        <input type="text" id="projectTitle" value="Luxury Villa Phase-1" class="bg-transparent text-sky-300 font-bold focus:outline-none w-36">
      </div>
      <button onclick="exportDXF()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-sky-300 font-semibold px-3 py-1.5 rounded-xl transition">💾 Export DXF</button>
      <button onclick="downloadImage()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-semibold px-3 py-1.5 rounded-xl transition shadow-lg">📥 Download Blueprint</button>
    </div>
  </header>

  <!-- MAIN WORKSPACE GRID -->
  <div class="max-w-[1800px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-4">
    
    <!-- LEFT SIDEBAR: TEMPLATES & NLP DESCRIPTION PARSER -->
    <div class="lg:col-span-4 bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col gap-4 shadow-xl max-h-[85vh] overflow-y-auto">
      
      <!-- 🖼️ TEMPLATE GALLERY SECTION -->
      <div>
        <div class="flex justify-between items-center mb-2">
          <h2 class="text-xs font-bold text-amber-400 flex items-center gap-1.5 uppercase tracking-wider">
            <span>🏛️</span> Luxury Templates Catalog
          </h2>
          <span class="text-[10px] text-slate-400">Click to load</span>
        </div>
        <div class="grid grid-cols-2 gap-2" id="templateCatalogGrid"></div>
      </div>

      <hr class="border-slate-800">

      <!-- 🗣️ NLP DESCRIPTION & VOICE ENGINE -->
      <div class="bg-gradient-to-br from-slate-950 to-sky-950/30 border border-sky-900/50 p-3.5 rounded-xl space-y-2.5">
        <div class="flex justify-between items-center">
          <label class="text-xs font-bold text-sky-300 flex items-center gap-1">
            <span>🤖</span> Smart AI Description Parser
          </label>
          <button onclick="toggleVoiceInput()" id="voiceBtn" class="bg-rose-600 hover:bg-rose-500 text-white text-[10px] font-bold px-2 py-1 rounded-lg transition">🎙️ Speak Urdu/Eng</button>
        </div>
        <textarea id="nlpPromptInput" rows="3" placeholder="Ex: 'Ek steel louver door hai width 1.1m, height 2.39m, kabze right side par, lock left par, aur 12 louver panels hon.'" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-xs text-slate-100 focus:outline-none focus:border-sky-500"></textarea>
        <button onclick="parseDescriptionAndRender()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-2 rounded-xl text-xs transition shadow-lg flex items-center justify-center gap-1.5">
          ⚡ Parse Description & Auto-Build CAD
        </button>
        <p id="parserFeedback" class="text-[10px] text-emerald-400 italic">✓ AI Engine active: Auto-detecting hinges, locks, and louvers...</p>
      </div>

      <!-- ⚙️ PRECISE MANUAL OVERRIDE CONTROLS -->
      <div class="bg-slate-950 p-3.5 rounded-xl border border-slate-800 space-y-3">
        <h3 class="text-xs font-bold text-slate-300 flex items-center gap-1">
          <span>🎛️</span> Manual Fine-Tuning Controls
        </h3>
        
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-[10px] text-slate-400 mb-1">Width (Meters)</label>
            <input type="number" id="manualW" value="1.1" step="0.05" oninput="applyManualEdits()" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-1.5 text-xs text-slate-200">
          </div>
          <div>
            <label class="block text-[10px] text-slate-400 mb-1">Height (Meters)</label>
            <input type="number" id="manualH" value="2.39" step="0.05" oninput="applyManualEdits()" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-1.5 text-xs text-slate-200">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-[10px] text-slate-400 mb-1">Hinges (Kabze) Side</label>
            <select id="manualHingeSide" onchange="applyManualEdits()" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-1.5 text-xs text-slate-200">
              <option value="right">Right Side</option>
              <option value="left">Left Side</option>
            </select>
          </div>
          <div>
            <label class="block text-[10px] text-slate-400 mb-1">Lock Side</label>
            <select id="manualLockSide" onchange="applyManualEdits()" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-1.5 text-xs text-slate-200">
              <option value="left">Left Side</option>
              <option value="right">Right Side</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-3 gap-2">
          <div>
            <label class="block text-[10px] text-slate-400 mb-1">Louver Panels</label>
            <input type="number" id="manualPanels" value="10" min="2" max="30" oninput="applyManualEdits()" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-1.5 text-xs text-slate-200">
          </div>
          <div>
            <label class="block text-[10px] text-slate-400 mb-1">Outer Frame (mm)</label>
            <input type="number" id="manualFrame" value="45" oninput="applyManualEdits()" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-1.5 text-xs text-slate-200">
          </div>
          <div>
            <label class="block text-[10px] text-slate-400 mb-1">Center Bar (mm)</label>
            <input type="number" id="manualCenter" value="40" oninput="applyManualEdits()" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-1.5 text-xs text-slate-200">
          </div>
        </div>
      </div>

    </div>

    <!-- RIGHT MAIN: AUTOCAD STYLE CANVAS WORKSPACE -->
    <div class="lg:col-span-8 bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col gap-3 shadow-xl">
      
      <!-- AutoCAD Toolbar -->
      <div class="flex flex-wrap justify-between items-center bg-slate-950 p-2 rounded-xl border border-slate-800">
        <div class="flex items-center gap-1.5">
          <button onclick="setTool('select')" id="t-select" class="tool-btn active px-3 py-1.5 bg-slate-800 border border-slate-700 rounded-lg text-xs font-semibold text-slate-200 transition">✋ Select / Move</button>
          <button onclick="setTool('zoomIn')" class="tool-btn px-3 py-1.5 bg-slate-800 border border-slate-700 rounded-lg text-xs font-semibold text-slate-200 transition">🔍 Zoom In</button>
          <button onclick="setTool('zoomOut')" class="tool-btn px-3 py-1.5 bg-slate-800 border border-slate-700 rounded-lg text-xs font-semibold text-slate-200 transition">🔍 Zoom Out</button>
          <button onclick="resetZoom()" class="tool-btn px-3 py-1.5 bg-slate-800 border border-slate-700 rounded-lg text-xs font-semibold text-slate-200 transition">🔄 Reset View</button>
        </div>
        <div class="text-xs text-sky-400 font-mono bg-sky-950/60 px-3 py-1 rounded-lg border border-sky-900">
          Status: <span id="cadStatusText">Ready (Auto-CAD Mode)</span>
        </div>
      </div>

      <!-- Canvas Container -->
      <div class="w-full bg-slate-950 border border-slate-800 rounded-xl flex justify-center items-center overflow-hidden relative min-h-[620px]">
        <canvas id="cadCanvas" width="1150" height="720" class="bg-white shadow-2xl cursor-crosshair"></canvas>
      </div>
      
    </div>

  </div>

  <script>
    const canvas = document.getElementById('cadCanvas');
    const ctx = canvas.getContext('2d');

    // Current Active Design Object State
    let currentDesign = {
      title: "DOOR STEEL (Men - Louver)",
      tag: "D1",
      width: 1.100,
      height: 2.390,
      hingeSide: "right", // "right" or "left"
      lockSide: "left",   // "left" or "right"
      panels: 10,
      frameWidth: 45,     // mm
      centerBarWidth: 40, // mm
      type: "steel_louver",
      offsetX: 0,
      offsetY: 0,
      scaleMultiplier: 260
    };

    let activeTool = 'select';
    let isDragging = false;
    let startDragX = 0, startDragY = 0;

    // Luxury Templates Catalog
    const TEMPLATES_DATABASE = [
      {
        id: 'D1',
        title: 'Steel Louver Door',
        desc: 'Steel louver door width 1.1m height 2.39m, kabze right par, lock left par, 10 louver panels',
        w: 1.1, h: 2.39, hinge: 'right', lock: 'left', panels: 10, icon: '🚪', type: 'steel_louver'
      },
      {
        id: 'D2',
        title: 'Executive Glass Door',
        desc: 'Executive glass door width 1.0m height 2.2m, kabze left par, lock right par, 4 glass panels',
        w: 1.0, h: 2.2, hinge: 'left', lock: 'right', panels: 4, icon: '🏛️', type: 'glass_panel'
      },
      {
        id: 'D3',
        title: 'Modern Geometric Gate',
        desc: 'Modern geometric gate width 1.3m height 2.5m, kabze right par, lock left par, 8 panels',
        w: 1.3, h: 2.5, hinge: 'right', lock: 'left', panels: 8, icon: '✨', type: 'geometric'
      },
      {
        id: 'D4',
        title: 'Heavy Double Garage',
        desc: 'Heavy double garage width 3.2m height 3.0m, kabze left par, lock right par, 16 panels',
        w: 3.2, h: 3.0, hinge: 'left', lock: 'right', panels: 16, icon: '🚘', type: 'steel_louver'
      }
    ];

    function renderTemplateCatalog() {
      const grid = document.getElementById('templateCatalogGrid');
      grid.innerHTML = TEMPLATES_DATABASE.map(t => `
        <div onclick="loadTemplate('${t.id}')" class="bg-slate-950 border border-slate-800 hover:border-sky-500 p-2.5 rounded-xl cursor-pointer transition flex items-center gap-2.5 group">
          <span class="text-2xl group-hover:scale-110 transition-transform">${t.icon}</span>
          <div>
            <div class="text-[11px] font-bold text-slate-200 group-hover:text-sky-300">${t.title}</div>
            <div class="text-[9px] text-slate-400">${t.w}m x ${t.h}m</div>
          </div>
        </div>
      `).join('');
    }

    function loadTemplate(id) {
      const t = TEMPLATES_DATABASE.find(item => item.id === id);
      if (!t) return;
      document.getElementById('nlpPromptInput').value = t.desc;
      parseDescriptionAndRender();
    }

    // Smart NLP Parser: Extracts Dimensions, Hinges, Locks, and Panels from Urdu/English Description
    function parseDescriptionAndRender() {
      const text = document.getElementById('nlpPromptInput').value.toLowerCase().trim();
      if (!text) return;

      document.getElementById('parserFeedback').innerText = "⚡ Parsing description & updating CAD layout...";

      // Extract Width and Height numbers
      const numbers = text.match(/\d+(\.\d+)?/g);
      if (numbers && numbers.length >= 2) {
        currentDesign.width = parseFloat(numbers[0]);
        currentDesign.height = parseFloat(numbers[1]);
      } else if (numbers && numbers.length === 1) {
        currentDesign.width = parseFloat(numbers[0]);
      }

      // Extract Panels count
      const panelMatch = text.match(/(\d+)\s*(panel|panels|louver|louvers)/);
      if (panelMatch) {
        currentDesign.panels = parseInt(panelMatch[1]);
      }

      // Extract Hinge Position (kabze)
      if (text.includes('right') || text.includes('sajay') || text.includes('sajay taraf') || text.includes('daen')) {
        currentDesign.hingeSide = 'right';
      } else if (text.includes('left') || text.includes('bay') || text.includes('bay taraf') || text.includes('baen')) {
        currentDesign.hingeSide = 'left';
      }

      // Extract Lock Position
      if (text.includes('lock right') || text.includes('lock sajay')) {
        currentDesign.lockSide = 'right';
      } else if (text.includes('lock left') || text.includes('lock bay')) {
        currentDesign.lockSide = 'left';
      } else {
        // opposite of hinge by default
        currentDesign.lockSide = currentDesign.hingeSide === 'right' ? 'left' : 'right';
      }

      // Sync Manual Input Fields
      document.getElementById('manualW').value = currentDesign.width;
      document.getElementById('manualH').value = currentDesign.height;
      document.getElementById('manualPanels').value = currentDesign.panels;
      document.getElementById('manualHingeSide').value = currentDesign.hingeSide;
      document.getElementById('manualLockSide').value = currentDesign.lockSide;

      setTimeout(() => {
        document.getElementById('parserFeedback').innerText = `✓ Successfully updated! W:${currentDesign.width}m, H:${currentDesign.height}m, Hinges:${currentDesign.hingeSide}, Lock:${currentDesign.lockSide}`;
        redrawCADCanvas();
      }, 200);
    }

    function applyManualEdits() {
      currentDesign.width = parseFloat(document.getElementById('manualW').value) || 1.1;
      currentDesign.height = parseFloat(document.getElementById('manualH').value) || 2.39;
      currentDesign.panels = parseInt(document.getElementById('manualPanels').value) || 10;
      currentDesign.hingeSide = document.getElementById('manualHingeSide').value;
      currentDesign.lockSide = document.getElementById('manualLockSide').value;
      currentDesign.frameWidth = parseFloat(document.getElementById('manualFrame').value) || 45;
      currentDesign.centerBarWidth = parseFloat(document.getElementById('manualCenter').value) || 40;

      redrawCADCanvas();
    }

    // Voice Input Handler
    let recognition;
    function toggleVoiceInput() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert("Speech recognition not supported in this browser.");
        return;
      }
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!recognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'ur-PK';
        recognition.onresult = (event) => {
          document.getElementById('nlpPromptInput').value = event.results[0][0].transcript;
          parseDescriptionAndRender();
        };
      }
      recognition.start();
    }

    function setTool(tool) {
      activeTool = tool;
      document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
      if(tool === 'select') document.getElementById('t-select').classList.add('active');
      
      if(tool === 'zoomIn') { currentDesign.scaleMultiplier *= 1.15; redrawCADCanvas(); }
      if(tool === 'zoomOut') { currentDesign.scaleMultiplier /= 1.15; redrawCADCanvas(); }
      document.getElementById('cadStatusText').innerText = `Tool Active: ${tool.toUpperCase()}`;
    }

    function resetZoom() {
      currentDesign.scaleMultiplier = 260;
      currentDesign.offsetX = 0;
      currentDesign.offsetY = 0;
      redrawCADCanvas();
    }

    // Professional AutoCAD Style Canvas Rendering Engine
    function redrawCADCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Background grid lines (AutoCAD CAD Grid Style)
      ctx.strokeStyle = "#F1F5F9";
      ctx.lineWidth = 1;
      const gridSize = 25;
      for (let x = 0; x < canvas.width; x += gridSize) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }

      // Outer border frame of sheet
      ctx.strokeStyle = "#1E293B";
      ctx.lineWidth = 2;
      ctx.strokeRect(15, 15, canvas.width - 30, canvas.height - 30);

      const scale = currentDesign.scaleMultiplier;
      const doorW = currentDesign.width * scale;
      const doorH = currentDesign.height * scale;

      const startX = (canvas.width - doorW) / 2 + currentDesign.offsetX;
      const startY = (canvas.height - doorH) / 2 + currentDesign.offsetY;

      ctx.save();
      ctx.translate(startX, startY);

      // 1. Outer Frame (Chowkat)
      ctx.strokeStyle = "#0F172A";
      ctx.lineWidth = 3;
      ctx.strokeRect(0, 0, doorW, doorH);

      // 2. Inner Door Panel Fill
      ctx.fillStyle = "#1E293B";
      ctx.fillRect(6, 6, doorW - 12, doorH - 12);

      // 3. Center Patti & Louver Slots Generation
      const centerW = Math.max(15, (currentDesign.centerBarWidth / 1000) * scale);
      const centerX = (doorW - centerW) / 2;

      ctx.strokeStyle = "#FFFFFF";
      ctx.lineWidth = 1.5;
      ctx.strokeRect(centerX, 15, centerW, doorH - 30);

      // Louver Slats
      const totalPanels = Math.max(2, currentDesign.panels);
      const stepY = (doorH - 30) / totalPanels;

      for (let i = 1; i < totalPanels; i++) {
        let ly = 15 + i * stepY;
        // Center bar internal cuts
        ctx.beginPath(); ctx.moveTo(centerX, ly); ctx.lineTo(centerX + centerW, ly); ctx.stroke();
        
        // Left Louver slot
        ctx.strokeStyle = "#64748B";
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(10, ly); ctx.lineTo(centerX - 4, ly); ctx.stroke();

        // Right Louver slot
        ctx.beginPath(); ctx.moveTo(centerX + centerW + 4, ly); ctx.lineTo(doorW - 10, ly); ctx.stroke();
      }

      // 4. Hardware: Hinges (Kabze) Automatic Placement
      ctx.fillStyle = "#F59E0B"; // Golden Brass Hinges
      const hingeX = currentDesign.hingeSide === 'right' ? doorW - 6 : 2;
      const hingePositions = [doorH * 0.15, doorH * 0.50, doorH * 0.85];
      
      hingePositions.forEach(hy => {
        ctx.fillRect(hingeX - 3, hy - 12, 6, 24);
        ctx.strokeStyle = "#000000";
        ctx.lineWidth = 1;
        ctx.strokeRect(hingeX - 3, hy - 12, 6, 24);
      });

      // 5. Hardware: Lock & Handle Automatic Placement
      const lockX = currentDesign.lockSide === 'left' ? 18 : doorW - 18;
      const lockY = doorH * 0.52;

      ctx.fillStyle = "#DC2626"; // Lock indicator
      ctx.beginPath();
      ctx.arc(lockX, lockY, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // Lock handle bar
      ctx.fillStyle = "#94A3B8";
      ctx.fillRect(lockX - 3, lockY + 7, 6, 18);
      ctx.strokeRect(lockX - 3, lockY + 7, 6, 18);

      ctx.restore();

      // 6. CAD Dimension Measurement Lines (Red Engineering Style)
      ctx.strokeStyle = "#EF4444";
      ctx.fillStyle = "#EF4444";
      ctx.font = "bold 10px monospace";
      ctx.textAlign = "center";

      // Width dimension top
      ctx.beginPath();
      ctx.moveTo(startX, startY - 10); ctx.lineTo(startX + doorW, startY - 10);
      ctx.moveTo(startX, startY - 15); ctx.lineTo(startX, startY - 5);
      ctx.moveTo(startX+ doorW, startY - 15); ctx.lineTo(startX + doorW, startY - 5);
      ctx.stroke();
      ctx.fillText(currentDesign.width.toFixed(3) + " m", startX + doorW / 2, startY - 18);

      // Height dimension left
      ctx.beginPath();
      ctx.moveTo(startX - 10, startY); ctx.lineTo(startX - 10, startY + doorH);
      ctx.moveTo(startX - 15, startY); ctx.lineTo(startX - 5, startY);
      ctx.moveTo(startX - 15, startY + doorH); ctx.lineTo(startX - 5, startY + doorH);
      ctx.stroke();

      ctx.save();
      ctx.translate(startX - 22, startY + doorH / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText(currentDesign.height.toFixed(3) + " m", 0, 0);
      ctx.restore();

      // Label & Tag Info at bottom
      ctx.fillText(`[${currentDesign.tag}] ${currentDesign.title} | Hinges: ${currentDesign.hingeSide.toUpperCase()} | Lock: ${currentDesign.lockSide.toUpperCase()}`, startX + doorW / 2, startY + doorH + 25);
    }

    // Mouse Dragging for AutoCAD Pan/Select
    canvas.addEventListener('mousedown', (e) => {
      if(activeTool === 'select') {
        isDragging = true;
        startDragX = e.clientX;
        startDragY = e.clientY;
      }
    });

    window.addEventListener('mousemove', (e) => {
      if(!isDragging) return;
      const dx = e.clientX - startDragX;
      const dy = e.clientY - startDragY;
      currentDesign.offsetX += dx;
      currentDesign.offsetY += dy;
      startDragX = e.clientX;
      startDragY = e.clientY;
      redrawCADCanvas();
    });

    window.addEventListener('mouseup', () => { isDragging = false; });

    // Export & Download Functions
    function exportDXF() {
      let dxf = `0\nSECTION\n2\nENTITIES\n0\nPOLYLINE\n8\nFRAME\n66\n1\n70\n1\n`;
      dxf += `0\nVERTEX\n8\nFRAME\n10\n0\n20\n0\n0\nVERTEX\n8\nFRAME\n10\n${currentDesign.width}\n20\n0\n`;
      dxf += `0\nVERTEX\n8\nFRAME\n10\n${currentDesign.width}\n20\n${currentDesign.height}\n0\nVERTEX\n8\nFRAME\n10\n0\n20\n${currentDesign.height}\n0\nSEQEND\n0\nENDSEC\n0\nEOF\n`;
      const blob = new Blob([dxf], { type: 'application/dxf' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'ASASCO_Luxury_Door.dxf'; a.click();
    }

    function downloadImage() {
      const a = document.createElement('a');
      a.href = canvas.toDataURL();
      a.download = 'ASASCO_CAD_Blueprint.png';
      a.click();
    }

    window.onload = () => {
      renderTemplateCatalog();
      parseDescriptionAndRender();
    };
  </script>
</body>
</html>
